<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Station Agent</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #1a1a2e;
        color: #eee;
      }
      .status {
        padding: 10px;
        border-radius: 8px;
        margin: 10px 0;
      }
      .status.connected {
        background: #16213e;
        border-left: 4px solid #0f0;
      }
      .status.sharing {
        background: #16213e;
        border-left: 4px solid #ff0;
      }
      h2 {
        color: #e94560;
      }
      #log {
        font-family: monospace;
        font-size: 12px;
        background: #0f0f23;
        padding: 10px;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
      }
      .log-entry {
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <h2>🖥️ Station Agent</h2>
    <div id="status" class="status connected">
      Status: Waiting for connection...
    </div>
    <div id="sharing-status" class="status" style="display: none">
      Screen sharing: Active
    </div>
    <h3>Log</h3>
    <div id="log"></div>

    <script>
      const ICE_SERVERS = [{ urls: "stun:stun.l.google.com:19302" }];

      // Track peer connections per admin
      const peerConnections = new Map();

      const log = (msg) => {
        const el = document.getElementById("log");
        const entry = document.createElement("div");
        entry.className = "log-entry";
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        el.appendChild(entry);
        el.scrollTop = el.scrollHeight;
        console.log(msg);
      };

      const setStatus = (text) => {
        document.getElementById("status").textContent = `Status: ${text}`;
      };

      // ========================================
      // Screen capture + WebRTC
      // ========================================
      async function startScreenShare(adminSocketId) {
        log(`Starting screen share for admin: ${adminSocketId}`);

        // Prevent duplicate connections
        if (peerConnections.has(adminSocketId)) {
          log(`Already sharing with ${adminSocketId}, cleaning up first`);
          stopScreenShare(adminSocketId);
        }

        try {
          // Get sources using promise pattern (preload uses 'once')
          const sources = await new Promise((resolve) => {
            window.agentAPI.onSourcesList((sources) => {
              resolve(sources);
            });
            window.agentAPI.getSources();
          });

          if (sources.length === 0) {
            log("No screen sources available");
            return;
          }

          const source = sources[0];
          log(`Using source: ${source.name} (${source.id})`);

          const stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              mandatory: {
                chromeMediaSource: "desktop",
                chromeMediaSourceId: source.id,
                maxWidth: 1920,
                maxHeight: 1080,
                maxFrameRate: 30,
              },
            },
          });

          log("Screen captured successfully");
          setupPeerConnection(adminSocketId, stream);
        } catch (e) {
          log(`Screen capture error: ${e.message}`);
        }
      }

      function setupPeerConnection(adminSocketId, stream) {
        const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
        peerConnections.set(adminSocketId, pc);

        // Add stream tracks
        stream.getTracks().forEach((track) => {
          pc.addTrack(track, stream);
        });

        // ICE candidates - serialize before sending via IPC
        pc.onicecandidate = (e) => {
          if (e.candidate) {
            window.agentAPI.sendIceCandidate({
              targetAdminId: adminSocketId,
              candidate: {
                candidate: e.candidate.candidate,
                sdpMid: e.candidate.sdpMid,
                sdpMLineIndex: e.candidate.sdpMLineIndex,
              },
            });
          }
        };

        pc.oniceconnectionstatechange = () => {
          log(`ICE state [${adminSocketId}]: ${pc.iceConnectionState}`);
          if (pc.iceConnectionState === "connected") {
            setStatus("Screen sharing active");
            document.getElementById("sharing-status").style.display = "block";
          }
          if (
            pc.iceConnectionState === "disconnected" ||
            pc.iceConnectionState === "failed"
          ) {
            stopScreenShare(adminSocketId);
          }
        };

        // Create offer and send to admin
        // IMPORTANT: serialize SDP as plain object { type, sdp } for IPC
        pc.createOffer()
          .then((offer) => {
            return pc.setLocalDescription(offer).then(() => offer);
          })
          .then((offer) => {
            window.agentAPI.sendOffer({
              targetAdminId: adminSocketId,
              sdp: { type: offer.type, sdp: offer.sdp }, // ← serialize!
            });
            log("Sent WebRTC offer to admin");
          })
          .catch((e) => log(`Offer error: ${e.message}`));
      }

      function stopScreenShare(adminSocketId) {
        const pc = peerConnections.get(adminSocketId);
        if (pc) {
          // Stop all tracks
          pc.getSenders().forEach((sender) => {
            if (sender.track) sender.track.stop();
          });
          pc.close();
          peerConnections.delete(adminSocketId);
          log(`Stopped sharing with ${adminSocketId}`);
        }

        if (peerConnections.size === 0) {
          document.getElementById("sharing-status").style.display = "none";
          setStatus("Connected - idle");
        }
      }

      // ========================================
      // Event listeners from main process
      // ========================================
      window.agentAPI.onStartScreenShare(({ adminSocketId }) => {
        startScreenShare(adminSocketId);
      });

      window.agentAPI.onStopScreenShare(({ adminSocketId }) => {
        stopScreenShare(adminSocketId);
      });

      // Receive ANSWER from admin - set as remote description
      window.agentAPI.onWebRTCAnswer(({ adminSocketId, sdp }) => {
        const pc = peerConnections.get(adminSocketId);
        if (!pc) {
          log(`No PC found for admin ${adminSocketId}`);
          return;
        }

        // Only accept answer when we're waiting for one
        if (pc.signalingState !== "have-local-offer") {
          log(
            `Ignoring answer, signaling state is: ${pc.signalingState} (expected have-local-offer)`,
          );
          return;
        }

        if (!sdp || !sdp.type || !sdp.sdp) {
          log(`Invalid answer SDP: ${JSON.stringify(sdp)}`);
          return;
        }

        pc.setRemoteDescription(
          new RTCSessionDescription({ type: sdp.type, sdp: sdp.sdp }),
        )
          .then(() => log("✅ Set remote description (answer) successfully"))
          .catch((e) => log(`Error setting answer: ${e.message}`));
      });

      // Receive ICE candidates from admin
      window.agentAPI.onWebRTCIceCandidate(({ adminSocketId, candidate }) => {
        const pc = peerConnections.get(adminSocketId);
        if (!pc) return;

        // Skip empty/end-of-candidates signals
        if (!candidate || !candidate.candidate) return;

        pc.addIceCandidate(new RTCIceCandidate(candidate)).catch((e) =>
          log(`ICE error: ${e.message}`),
        );
      });

      // Remote control logging
      window.agentAPI.onMouseMove(() => {});
      window.agentAPI.onMouseClick(() => {});
      window.agentAPI.onKeyTap(() => {});

      // Screenshot
      window.agentAPI.onTakeScreenshot(async ({ targetAdminId }) => {
        log("Taking screenshot...");
        try {
          window.agentAPI.getSources();
        } catch (e) {
          log(`Screenshot error: ${e.message}`);
        }
      });

      // Lock/Unlock
      window.agentAPI.onLock(() => {
        log("Station locked by admin");
        setStatus("LOCKED");
      });

      window.agentAPI.onUnlock(() => {
        log("Station unlocked");
        setStatus("Connected - idle");
      });

      window.agentAPI.onShowMessage(({ message }) => {
        log(`Admin message: ${message}`);
      });

      setStatus("Waiting for server connection...");
      log("Station agent renderer initialized");
    </script>
  </body>
</html>
